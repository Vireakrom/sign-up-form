<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div class="left-container">
      <div class="logo-container">
        <img src="/images/logo.png" alt="Odin logo" />
        <h1>ODIN</h1>
      </div>
      <p>
        Photo by
        <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
        <a href="https://unsplash.com/">Unsplash</a>
      </p>
    </div>
    <div class="right-container">
      <div class="form-header">
        <p>
          This is not real online service! You know you need something like this
          in your life to help you relize your deapest dream. <br />
          Sign up now to get started.
        </p>
        <p>You know you want to.</p>
      </div>
      <form action="" method="get" class="login-form" id="login-form">
        <h3>Let's do this!</h3>
        <div class="form-field">
          <div class="form-row">
            <label for="first-name">FIRST NAME</label>
            <input id="first-name" name="first-name" type="text" />
          </div>
          <div class="form-row">
            <label for="last-name">LAST NAME</label>
            <input id="last-name" name="last-name" type="text" />
          </div>
          <div class="form-row">
            <label for="email">EMAIL</label>
            <input id="email" name="email" type="email" />
          </div>
          <div class="form-row">
            <label for="phone-number">PHONE NUMBER</label>
            <input id="phone-number" name="phone-number" type="tel" />
          </div>
          <div class="form-row">
            <label for="password">PASSWORD</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              minlength="8"
              maxlength="32"
            />
          </div>
          <div class="form-row">
            <label for="confirm-password">CONFIRM PASSWORD</label>
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              required
              minlength="8"
              maxlength="32"
            />
          </div>
        </div>
      </form>
      <button form="login-form" type="submit">Create Account</button>
      <p>Already have an account? <a href="">Login</a></p>
    </div>
  </body>
</html>
